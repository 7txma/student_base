<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改学生</title>
    <style>
        form { width: 400px; margin: 50px auto; }
        div { margin: 15px 0; }
        label { display: inline-block; width: 80px; }
        input { width: 200px; padding: 5px; }
        button { padding: 5px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .back { display: inline-block; margin-left: 20px; text-decoration: none; color: blue; }
    </style>
</head>
<body>
<h2 style="text-align: center;">修改学生信息</h2>
<form th:action="@{'/students/edit/' + ${student.studentId}}" th:object="${student}" method="post">
    <div>
        <label>学号：</label>
        <input type="text" th:field="*{studentId}" readonly>
    </div>
    <div>
        <label>姓名：</label>
        <input type="text" th:field="*{name}" required>
    </div>
    <div>
        <label>班级：</label>
        <input type="text" th:field="*{className}" required>
    </div>
    <div style="text-align: center;">
        <button type="submit">提交修改</button>
        <a href="/students" class="back">返回列表</a>
    </div>
</form>
</body>
</html>
