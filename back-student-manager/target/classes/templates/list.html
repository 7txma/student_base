<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生列表</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        a { margin: 0 5px; text-decoration: none; color: blue; }
        .add-btn { display: block; width: 100px; margin: 20px auto; padding: 10px; background: #4CAF50; color: white; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>
<h2 style="text-align: center;">学生管理系统</h2>
<a href="/students/add" class="add-btn">新增学生</a>
<table>
    <tr>
        <th>学号</th>
        <th>姓名</th>
        <th>班级</th>
        <th>操作</th>
    </tr>
    <tr th:each="student : ${students}">
        <td th:text="${student.studentId}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.className}"></td>
        <td>
            <a th:href="@{'/students/edit/' + ${student.studentId}}">修改</a>
            <a th:href="@{'/students/delete/' + ${student.studentId}}" onclick="return confirm('确定删除吗？')">删除</a>
        </td>
    </tr>
</table>
</body>
</html>
